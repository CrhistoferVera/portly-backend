# ── Base de datos: H2 en memoria (sin necesidad de PostgreSQL externo) ──────
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# ── JWT ──────────────────────────────────────────────────────────────────────
jwt.secret=test-secret-key-for-unit-tests-only-at-least-256-bits-long
jwt.expiration-days=1

# ── OAuth — valores dummy para que el contexto arranque ─────────────────────
linkedin.client-id=dummy-linkedin-id
linkedin.client-secret=dummy-linkedin-secret
linkedin.redirect-uri=http://localhost:8080/auth/linkedin/callback
linkedin.scope=openid profile email

github.client-id=dummy-github-id
github.client-secret=dummy-github-secret
github.redirect-uri=http://localhost:8080/auth/github/callback

google.client-id=dummy-google-id
google.client-secret=dummy-google-secret
google.redirect-uri=http://localhost:8080/auth/google/callback

# ── App ──────────────────────────────────────────────────────────────────────
app.frontend-url=http://localhost:5173

# ── Email ────────────────────────────────────────────────────────────────────
spring.mail.username=test@example.com
brevo.api.key=dummy-brevo-key

# ── Cloudinary — valores dummy para que el contexto arranque ────────────────
cloudinary.cloud-name=dummy-cloud-name
cloudinary.api-key=dummy-api-key
cloudinary.api-secret=dummy-api-secret
