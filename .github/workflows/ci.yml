name: CI — Build & Test

on:
  push:
    branches:
      - main
      - dev
      - 'features/**'
      - 'feature/**'
      - 'fix/**'
  pull_request:
    branches:
      - main
      - dev

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Build and test
        run: ./mvnw test --no-transfer-progress
        env:
          # Las variables de BD, JWT y OAuth se sobreescriben por
          # src/test/resources/application.properties (H2 en memoria).
          # Se definen aquí solo como fallback o para futuros tests de integración.
          DB_URL:        ${{ secrets.DB_URL }}
          DB_USERNAME:   ${{ secrets.DB_USERNAME }}
          DB_PASSWORD:   ${{ secrets.DB_PASSWORD }}
          JWT_SECRET:    ${{ secrets.JWT_SECRET }}
          LINKEDIN_CLIENT_ID:     ${{ secrets.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET: ${{ secrets.LINKEDIN_CLIENT_SECRET }}
          GITHUB_CLIENT_ID:       ${{ secrets.GH_CLIENT_ID }}
          GITHUB_CLIENT_SECRET:   ${{ secrets.GH_CLIENT_SECRET }}
          GOOGLE_CLIENT_ID:       ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:   ${{ secrets.GOOGLE_CLIENT_SECRET }}
          MAIL_USERNAME:          ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD:          ${{ secrets.MAIL_PASSWORD }}
          FRONTEND_URL: http://localhost:5173
          SERVER_PORT:  8080

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: 7

  deploy:
    name: Deploy to EasyPanel
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Trigger EasyPanel Deploy
        run: curl -X POST ${{ secrets.EASYPANEL_DEPLOY_WEBHOOK }}
